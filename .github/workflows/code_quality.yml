# SPDX-License-Identifier: Apache-2.0
name: Qodana

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
      - "releases/*"

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  qodana:
    name: Qodana
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2026.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
          CARGO_HOME: /data/cache/cargo
        with:
          args: |
            -u root
            --baseline qodana.sarif.json
            --linter qodana-rust
          upload-result: true
